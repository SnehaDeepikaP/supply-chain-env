name: supply_chain_disruption_manager
version: "1.0.0"
description: >
  A real-world supply chain disruption management environment.
  An AI agent must respond to supplier failures, port closures, demand spikes,
  and cascading crises by activating alternative suppliers, rerouting shipments,
  reallocating inventory, and negotiating emergency contracts — all under budget
  and time pressure.

tags:
  - openenv
  - supply-chain
  - logistics
  - real-world
  - multi-task

author: "Supply Chain OpenEnv Team"
license: MIT

tasks:
  - id: supplier_triage
    name: "Supplier Triage"
    difficulty: easy
    horizon: 7
    description: >
      Primary supplier (30% of supply) goes offline due to factory fire.
      Agent must select and activate the best available alternative supplier
      to prevent stockout at the main warehouse within 7 days and budget.
    reward_range: [0.0, 1.0]
    actions:
      - activate_supplier
      - wait

  - id: logistics_reroute
    name: "Logistics Reroute"
    difficulty: medium
    horizon: 14
    description: >
      Major port (Rotterdam) closed by strike. Three shipments blocked.
      Agent must reroute them via alternative ports and reallocate stock
      across three warehouses to prevent stockouts. Multiple trade-offs
      between cost and delivery speed.
    reward_range: [0.0, 1.0]
    actions:
      - reroute_shipment
      - allocate_stock
      - activate_supplier
      - wait

  - id: cascade_disruption
    name: "Cascading Disruption"
    difficulty: hard
    horizon: 21
    description: >
      Typhoon takes out 2 suppliers and a port simultaneously. Demand spikes
      +80% at critical warehouses. Mid-episode shocks (factory explosion on day 7,
      currency shock on day 14) are hidden at reset. Agent must triage, negotiate,
      and adapt dynamically under budget that cannot serve all demand.
    reward_range: [0.0, 1.0]
    actions:
      - activate_supplier
      - negotiate_contract
      - allocate_stock
      - reroute_shipment
      - wait

observation_space:
  type: object
  fields:
    - name: suppliers
      type: "List[SupplierStatus]"
      description: Status of all suppliers including availability and disruption info
    - name: warehouses
      type: "List[WarehouseStatus]"
      description: Stock levels, capacity, and demand forecasts per warehouse
    - name: active_shipments
      type: "List[ShipmentStatus]"
      description: In-transit and blocked shipments
    - name: disruption_events
      type: "List[DisruptionEvent]"
      description: Active disruption events visible to the agent
    - name: budget_remaining
      type: float
      description: Remaining operational budget in USD
    - name: service_level
      type: float
      description: Fraction of demand met so far (0.0–1.0)
    - name: days_elapsed
      type: int

action_space:
  type: object
  fields:
    - name: action_type
      type: string
      enum: [activate_supplier, reroute_shipment, allocate_stock, negotiate_contract, wait]
    - name: activate_supplier
      type: ActivateSupplierAction
      optional: true
    - name: reroute_shipment
      type: RerouteShipmentAction
      optional: true
    - name: allocate_stock
      type: AllocateStockAction
      optional: true
    - name: negotiate_contract
      type: NegotiateContractAction
      optional: true

reward_function:
  description: >
    Weighted sum of service level (demand met), cost efficiency (budget remaining),
    and resilience (speed of recovery). Penalizes stockouts and invalid actions.
    Provides signal every step — not just at episode end.
  components:
    - service_level: weight varies per task (0.4–0.5)
    - cost_efficiency: weight varies per task (0.2–0.3)
    - resilience: weight varies per task (0.25–0.3)
    - penalty: subtracted for invalid actions and stockouts

api:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  grade: "GET /grade"
  tasks: "GET /tasks"
  health: "GET /health"

baseline_scores:
  supplier_triage: 0.61
  logistics_reroute: 0.47
  cascade_disruption: 0.28
  overall: 0.45

runtime:
  max_minutes: 20
  vcpu: 2
  memory_gb: 8
